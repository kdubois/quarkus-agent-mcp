name: Post Release

on:
  workflow_run:
    workflows: ["Quarkus Perform Release"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  post-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Detect Maven Wrapper
        run: |
          if [ -f mvnw ]; then
            echo "MAVEN_EXEC=./mvnw" >> $GITHUB_ENV
          else
            echo "MAVEN_EXEC=mvn" >> $GITHUB_ENV
          fi

      - name: Get release version
        run: |
          echo "RELEASE_VERSION=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_ENV

      - name: Build uber-jar
        run: $MAVEN_EXEC -B package -DskipTests -DskipITs -Dquarkus.package.jar.type=uber-jar

      - name: Wait for Maven Central availability
        run: |
          echo "Waiting for artifact to be available in Maven Central..."
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" \
              "https://repo1.maven.org/maven2/io/quarkus/quarkus-agent-mcp/${RELEASE_VERSION}/quarkus-agent-mcp-${RELEASE_VERSION}-runner.jar" \
              | grep -q "200"; then
              echo "Artifact found!"
              break
            fi
            echo "Attempt $i: Artifact not yet available, waiting 60s..."
            sleep 60
          done

      - name: Upload uber-jar to GitHub Release
        run: |
          gh release upload ${RELEASE_VERSION} \
            target/quarkus-agent-mcp-${RELEASE_VERSION}-runner.jar \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update plugin.json and marketplace.json
        run: |
          jq --arg v "$RELEASE_VERSION" '.version = $v' .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json
          jq --arg v "$RELEASE_VERSION" '.plugins[0].version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

      - name: Commit updated plugin files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update plugin version for ${RELEASE_VERSION}"
          file_pattern: .claude-plugin/*.json
          branch: main
